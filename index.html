<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEHC ER Box Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 3px solid #1d4ed8; color: #1d4ed8; }
        .btn-status { transition: all 0.2s; border: 2px solid #e2e8f0; }
        .selected-good { border-color: #3b82f6; background-color: #eff6ff; color: #1d4ed8; }
        .selected-repair { border-color: #ef4444; background-color: #fef2f2; color: #b91c1c; }
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="auth" class="fixed inset-0 bg-blue-900 z-50 flex flex-col items-center justify-center p-6 text-white text-center">
        <h1 class="text-3xl font-black mb-2">ER PORTAL</h1>
        <p class="text-blue-300 text-sm mb-8 uppercase tracking-widest">Suggestion Box System</p>
        <div class="w-full max-w-xs space-y-4">
            <input type="password" id="pw" placeholder="Mật khẩu" class="w-full p-4 rounded-2xl text-black text-center outline-none ring-4 ring-blue-800 focus:ring-blue-500 transition-all">
            <button onclick="login()" class="w-full bg-blue-500 hover:bg-blue-400 p-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all">TRUY CẬP</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xs">ER</div>
                <span class="font-black text-slate-700 tracking-tight">SEHC-ER v1.2</span>
            </div>
            <div class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
        </header>

        <nav class="bg-white border-b flex sticky top-[64px] z-40">
            <button onclick="tab('rec')" id="t-rec" class="flex-1 py-4 font-bold text-sm active-tab">NHẬP LIỆU</button>
            <button onclick="tab('dash')" id="t-dash" class="flex-1 py-4 font-bold text-sm text-slate-400">THỐNG KÊ</button>
        </nav>

        <div id="c-rec" class="p-4 max-w-md mx-auto pb-24">
            <div class="bg-white p-6 rounded-3xl shadow-xl shadow-slate-200/50 space-y-5 border border-slate-100">
                <section>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Vị trí hộp thư</label>
                    <select id="box" class="w-full p-4 bg-slate-50 border-none rounded-2xl mt-1 outline-none ring-2 ring-transparent focus:ring-blue-500 transition-all"></select>
                </section>

                <section>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Nhân viên PIC</label>
                    <select id="pic" class="w-full p-4 bg-slate-50 border-none rounded-2xl mt-1 outline-none ring-2 ring-transparent focus:ring-blue-500 transition-all"></select>
                </section>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setStatus('Good')" id="b-good" class="btn-status p-4 rounded-2xl font-bold selected-good">
                        <i class="fas fa-check-circle block mb-1"></i> GOOD
                    </button>
                    <button onclick="setStatus('Cần sửa chữa')" id="b-repair" class="btn-status p-4 rounded-2xl font-bold text-slate-400">
                        <i class="fas fa-tools block mb-1"></i> REPAIR
                    </button>
                </div>

                <section>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Số lượng thư</label>
                    <input type="number" id="qty" value="0" min="0" oninput="toggleVoc()" class="w-full p-4 bg-slate-50 border-none rounded-2xl mt-1 text-center font-black text-2xl text-blue-600 outline-none">
                </section>

                <div id="area-voc" class="hidden space-y-4">
                    <textarea id="voc" placeholder="Tóm tắt nội dung VOC..." class="w-full p-4 bg-blue-50 border-none rounded-2xl h-24 outline-none placeholder:text-blue-300"></textarea>
                </div>

                <div id="area-repair" class="hidden">
                    <textarea id="note" placeholder="Mô tả hư hỏng..." class="w-full p-4 bg-red-50 border-none rounded-2xl h-20 outline-none placeholder:text-red-300"></textarea>
                </div>

                <div id="area-img" class="hidden border-2 border-dashed border-slate-200 p-4 rounded-2xl text-center">
                    <label class="block text-sm font-bold text-slate-500 mb-2">Chụp ảnh minh chứng *</label>
                    <input type="file" id="img" accept="image/*" class="text-xs w-full">
                </div>

                <button onclick="submit()" id="btn" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg shadow-blue-200 active:scale-95 transition-all">GỬI DỮ LIỆU</button>
            </div>
        </div>

        <div id="c-dash" class="hidden p-4 pb-24">
            <div id="stats" class="grid grid-cols-2 gap-3 mb-6"></div>
            <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-slate-100">
                <table class="w-full text-left text-[11px]">
                    <thead class="bg-slate-50 text-slate-400 font-bold uppercase">
                        <tr><th class="p-4">Hộp thư</th><th class="p-4">Ngày</th><th class="p-4 text-center">Status</th></tr>
                    </thead>
                    <tbody id="hist" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold text-sm shadow-2xl opacity-0 translate-y-10 transition-all duration-300 pointer-events-none z-50"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxvkWQw7Bw-826TWc1QbsE5IdZVqkujR1u5PVdICrBuVTM1BoSKKIbn0qNBkK7yk07k4Q/exec";
        let db = { locations: [], erStaff: [], history: [] };
        let curStatus = 'Good';

        function login() {
            if(document.getElementById('pw').value === '55555') {
                document.getElementById('auth').remove();
                document.getElementById('mainApp').classList.remove('hidden');
                load();
            } else { alert("Sai mật khẩu!"); }
        }

        async function load() {
            const r = await fetch(URL);
            db = await r.json();
            document.getElementById('box').innerHTML = db.locations.map(l => `<option value="${l}">${l}</option>`).join('');
            document.getElementById('pic').innerHTML = db.erStaff.map(s => `<option value="${s}">${s}</option>`).join('');
            render();
        }

        function setStatus(s) {
            curStatus = s;
            document.getElementById('b-good').className = `btn-status p-4 rounded-2xl font-bold ${s==='Good'?'selected-good':'text-slate-400'}`;
            document.getElementById('b-repair').className = `btn-status p-4 rounded-2xl font-bold ${s==='Cần sửa chữa'?'selected-repair':'text-slate-400'}`;
            document.getElementById('area-repair').classList.toggle('hidden', s !== 'Cần sửa chữa');
            toggleVoc();
        }

        function toggleVoc() {
            const q = parseInt(document.getElementById('qty').value) || 0;
            document.getElementById('area-voc').classList.toggle('hidden', q === 0);
            document.getElementById('area-img').classList.toggle('hidden', q === 0 && curStatus === 'Good');
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-10'), 3000);
        }

        async function submit() {
            const q = parseInt(document.getElementById('qty').value) || 0;
            const f = document.getElementById('img').files[0];
            if ((q > 0 || curStatus === 'Cần sửa chữa') && !f) return showToast("⚠️ Phải chụp ảnh minh chứng!");

            const b = document.getElementById('btn');
            b.disabled = true; b.innerText = "ĐANG LƯU...";
            
            const payload = {
                location: document.getElementById('box').value,
                erName: document.getElementById('pic').value,
                status: curStatus,
                mailCount: q,
                vocSummary: document.getElementById('voc').value,
                note: document.getElementById('note').value,
                image: null
            };

            if (f) {
                const reader = new FileReader();
                reader.readAsDataURL(f);
                reader.onload = async () => {
                    payload.image = reader.result;
                    await send(payload);
                };
            } else { await send(payload); }
        }

        async function send(p) {
            try {
                showToast("🚀 Đang đồng bộ...");
                await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
                showToast("✅ Lưu thành công!");
                setTimeout(() => location.reload(), 1500);
            } catch(e) { showToast("❌ Lỗi kết nối!"); document.getElementById('btn').disabled = false; }
        }

        function tab(t) {
            document.getElementById('c-rec').classList.toggle('hidden', t !== 'rec');
            document.getElementById('c-dash').classList.toggle('hidden', t !== 'dash');
            document.getElementById('t-rec').className = `flex-1 py-4 font-bold text-sm ${t==='rec'?'active-tab':'text-slate-400'}`;
            document.getElementById('t-dash').className = `flex-1 py-4 font-bold text-sm ${t==='dash'?'active-tab':'text-slate-400'}`;
        }

        function render() {
            const hist = [...db.history].reverse().slice(0, 15);
            document.getElementById('hist').innerHTML = hist.map(r => `
                <tr>
                    <td class="p-4 font-bold text-slate-700">${r[1]}</td>
                    <td class="p-4 text-slate-400">${new Date(r[0]).toLocaleDateString('vi')}</td>
                    <td class="p-4 text-center">
                        <span class="px-2 py-1 rounded-lg font-bold ${r[3]==='Good'?'bg-green-100 text-green-600':'bg-red-100 text-red-600'}">
                            ${r[3]==='Good'?'OK':'FIX'}
                        </span>
                    </td>
                </tr>
            `).join('');
            
            document.getElementById('stats').innerHTML = `
                <div class="bg-blue-600 p-5 rounded-3xl text-white shadow-lg shadow-blue-200">
                    <div class="text-[10px] font-black opacity-60 uppercase">Đã kiểm tra</div>
                    <div class="text-2xl font-black">${new Set(db.history.filter(r => (new Date() - new Date(r[0])) < 7*24*60*60*1000).map(r => r[1])).size}/10</div>
                </div>
                <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                    <div class="text-[10px] font-black text-slate-400 uppercase">Tổng VOC tuần</div>
                    <div class="text-2xl font-black text-slate-700">${db.history.filter(r => (new Date() - new Date(r[0])) < 7*24*60*60*1000).reduce((a,b) => a + (parseInt(b[4])||0), 0)}</div>
                </div>`;
        }
    </script>
</body>
</html>

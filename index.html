<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEHC ER System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .active-tab { border-bottom: 3px solid #1d4ed8; color: #1d4ed8; }
        .mandatory { border: 2px solid #ef4444 !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div id="authOverlay" class="fixed inset-0 bg-blue-900 z-50 flex flex-col items-center justify-center p-6 text-white">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-2xl font-bold mb-6 italic">SEHC ER MAILBOX SYSTEM</h1>
            <input type="password" id="passInput" placeholder="Mật khẩu" class="w-full p-4 rounded-xl text-black text-center mb-4 outline-none">
            <button onclick="checkAuth()" class="w-full bg-blue-500 font-bold p-4 rounded-xl shadow-lg">XÁC NHẬN</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="bg-white p-4 shadow-sm sticky top-0 z-30 flex justify-between items-center">
            <span class="font-bold text-blue-700">SUGGESTION BOX</span>
            <span id="syncStatus" class="text-[10px] bg-green-100 text-green-600 px-2 py-1 rounded-full font-bold uppercase">Online</span>
        </header>

        <nav class="bg-white border-b flex sticky top-[56px] z-30">
            <button onclick="switchTab('record')" id="tabRecord" class="flex-1 py-3 font-bold text-sm active-tab">NHẬP LIỆU</button>
            <button onclick="switchTab('dashboard')" id="tabDashboard" class="flex-1 py-3 font-bold text-sm text-slate-400">THỐNG KÊ</button>
        </nav>

        <main id="contentRecord" class="p-4 max-w-md mx-auto space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4 border border-slate-100">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Vị trí hộp thư</label>
                    <select id="f_location" class="w-full p-3 bg-slate-50 border rounded-xl outline-none"></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Nhân viên ER</label>
                    <select id="f_staff" class="w-full p-3 bg-slate-50 border rounded-xl outline-none"></select>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="selectStatus('Good')" id="statusGood" class="p-3 border-2 rounded-xl bg-blue-50 border-blue-500 text-blue-600 font-bold">Good</button>
                    <button onclick="selectStatus('Cần sửa chữa')" id="statusRepair" class="p-3 border-2 rounded-xl border-slate-100 text-slate-400 font-bold">Repair</button>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Số lượng thư</label>
                    <input type="number" id="f_count" value="0" min="0" class="w-full p-3 bg-slate-50 border rounded-xl outline-none font-bold text-blue-600 text-center">
                </div>

                <div id="vocArea" class="hidden animate-pulse">
                    <label class="text-[10px] font-bold text-red-500 uppercase">Tóm tắt nội dung VOC *</label>
                    <textarea id="f_voc" class="w-full p-3 bg-red-50 border border-red-200 rounded-xl h-20 outline-none"></textarea>
                </div>

                <div id="imageArea" class="hidden">
                    <label class="text-[10px] font-bold text-orange-500 uppercase">Hình ảnh minh chứng (Bắt buộc) *</label>
                    <input type="file" id="f_image" accept="image/*" class="w-full text-sm mt-1">
                </div>

                <div id="noteArea" class="hidden">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Ghi chú sửa chữa</label>
                    <textarea id="f_note" class="w-full p-3 bg-slate-50 border rounded-xl h-16 outline-none"></textarea>
                </div>

                <button onclick="submitData()" id="btnSubmit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl active:scale-95 transition-all">GỬI BÁO CÁO</button>
            </div>
        </main>

        <main id="contentDashboard" class="hidden p-4 space-y-4">
            <div id="statsSummary" class="grid grid-cols-2 gap-3"></div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-[11px] text-left">
                    <thead class="bg-slate-50">
                        <tr><th class="p-3">Hộp thư</th><th class="p-3">Thời gian</th><th class="p-3">Số lượng</th></tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black/80 text-white px-6 py-3 rounded-full text-sm font-bold opacity-0 transition-all pointer-events-none z-50"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxvkWQw7Bw-826TWc1QbsE5IdZVqkujR1u5PVdICrBuVTM1BoSKKIbn0qNBkK7yk07k4Q/exec";
        let masterData = { locations: [], erStaff: [], history: [] };
        let selectedStatus = 'Good';

        function checkAuth() {
            if (document.getElementById('passInput').value === 'sehc@2026') {
                document.getElementById('authOverlay').remove();
                document.getElementById('app').classList.remove('hidden');
                init();
            } else { alert('Sai mật khẩu!'); }
        }

        async function init() {
            const res = await fetch(API_URL);
            masterData = await res.json();
            document.getElementById('f_location').innerHTML = masterData.locations.map(l => `<option value="${l}">${l}</option>`).join('');
            document.getElementById('f_staff').innerHTML = masterData.erStaff.map(s => `<option value="${s}">${s}</option>`).join('');
            renderDashboard();
        }

        function selectStatus(s) {
            selectedStatus = s;
            document.getElementById('statusGood').className = s === 'Good' ? 'p-3 border-2 rounded-xl bg-blue-50 border-blue-500 text-blue-600 font-bold' : 'p-3 border-2 rounded-xl border-slate-100 text-slate-400 font-bold';
            document.getElementById('statusRepair').className = s === 'Cần sửa chữa' ? 'p-3 border-2 rounded-xl bg-red-50 border-red-500 text-red-600 font-bold' : 'p-3 border-2 rounded-xl border-slate-100 text-slate-400 font-bold';
            document.getElementById('noteArea').classList.toggle('hidden', s !== 'Cần sửa chữa');
            toggleImageRequirement();
        }

        document.getElementById('f_count').addEventListener('input', toggleImageRequirement);

        function toggleImageRequirement() {
            const count = parseInt(document.getElementById('f_count').value) || 0;
            const needsImage = (selectedStatus === 'Cần sửa chữa' || count > 0);
            document.getElementById('imageArea').classList.toggle('hidden', !needsImage);
            document.getElementById('vocArea').classList.toggle('hidden', count === 0);
        }

        function switchTab(t) {
            document.getElementById('contentRecord').classList.toggle('hidden', t !== 'record');
            document.getElementById('contentDashboard').classList.toggle('hidden', t !== 'dashboard');
            document.getElementById('tabRecord').className = t === 'record' ? 'flex-1 py-3 font-bold text-sm active-tab' : 'flex-1 py-3 font-bold text-sm text-slate-400';
            document.getElementById('tabDashboard').className = t === 'dashboard' ? 'flex-1 py-3 font-bold text-sm active-tab' : 'flex-1 py-3 font-bold text-sm text-slate-400';
            if(t==='dashboard') renderDashboard();
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('opacity-100');
            setTimeout(() => t.classList.remove('opacity-100'), 3000);
        }

        async function submitData() {
            const count = parseInt(document.getElementById('f_count').value) || 0;
            const imageFile = document.getElementById('f_image').files[0];
            
            // Validation
            if ((selectedStatus === 'Cần sửa chữa' || count > 0) && !imageFile) {
                showToast("⚠️ Vui lòng chụp ảnh minh chứng!");
                document.getElementById('f_image').classList.add('mandatory');
                return;
            }

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = "ĐANG GỬI...";

            const payload = {
                location: document.getElementById('f_location').value,
                erName: document.getElementById('f_staff').value,
                status: selectedStatus,
                mailCount: count,
                vocSummary: document.getElementById('f_voc').value,
                note: document.getElementById('f_note').value,
                image: null
            };

            if (imageFile) {
                const reader = new FileReader();
                reader.readAsDataURL(imageFile);
                reader.onload = async () => {
                    payload.image = reader.result;
                    await send(payload);
                };
            } else { await send(payload); }
        }

        async function send(p) {
            try {
                showToast("🚀 Đang đồng bộ dữ liệu...");
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
                showToast("✅ Đã lưu thành công!");
                setTimeout(() => location.reload(), 1500);
            } catch (e) { showToast("❌ Lỗi mạng!"); }
        }

        function renderDashboard() {
            const history = masterData.history.slice(-10).reverse();
            document.getElementById('historyBody').innerHTML = history.map(r => `
                <tr class="border-b">
                    <td class="p-3 font-bold">${r[1]}</td>
                    <td class="p-3 text-slate-500">${new Date(r[0]).toLocaleDateString('vi')}</td>
                    <td class="p-3 text-center"><span class="bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold">${r[5]}</span></td>
                </tr>
            `).join('');
            
            document.getElementById('statsSummary').innerHTML = `
                <div class="bg-blue-600 p-4 rounded-xl text-white">
                    <div class="text-[10px] opacity-80">TUẦN NÀY</div>
                    <div class="text-xl font-bold">${new Set(masterData.history.map(r => r[1])).size}/10 Hộp</div>
                </div>
                <div class="bg-white p-4 rounded-xl border">
                    <div class="text-[10px] text-slate-400">TỔNG VOC</div>
                    <div class="text-xl font-bold text-slate-700">${masterData.history.reduce((a,b)=>a+parseInt(b[5]||0),0)} Thư</div>
                </div>
            `;
        }
    </script>
</body>
</html>
